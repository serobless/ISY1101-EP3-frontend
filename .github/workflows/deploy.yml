name: CI/CD Frontend

on:
  push:
    branches: [deploy]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y push imagen frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: serobless/isy1101-ep2-front:latest
          build-args: |
            VITE_API_VENTAS_URL=${{ secrets.VITE_API_VENTAS_URL }}
            VITE_API_DESPACHOS_URL=${{ secrets.VITE_API_DESPACHOS_URL }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy en EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull serobless/isy1101-ep2-front:latest
            docker stop front || true
            docker rm front || true
            docker run -d \
              --name front \
              --restart unless-stopped \
              -p 80:80 \
              serobless/isy1101-ep2-front:latest
